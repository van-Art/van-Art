name: Generate ASCII Avatar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  generate-ascii-avatar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate new ASCII avatar
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REMBG_MODEL: "birefnet-portrait"
          ASCII_WIDTH: "88"
        run: |
          python scripts/generate_ascii_avatar.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/ascii-avatar-dark-v3.svg
          git add assets/ascii-avatar-light-v3.svg
          git add assets/avatar-no-background-v3.png

          if git diff --cached --quiet; then
            echo "Generated files did not change."
            exit 0
          fi

          git commit -m "Update ASCII profile avatar v3"
          git push origin "HEAD:${GITHUB_REF_NAME}"
